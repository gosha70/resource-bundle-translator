# Restrict pytest collection to the canonical `test_*.py` pattern in
# the cycle-0-target `tests/` directory. The legacy `test/` directory
# contains:
#   - `*_test.py` scratch scripts (simple_test.py, nllb_test.py,
#     opus_test.py) that execute HuggingFace model downloads at import
#     time — slow, network-dependent, no assertions
#   - an `__init__ .py` file with a literal space in the name that
#     breaks pytest's module-import collection
# Cycle 0 reorganizes everything under `tests/` proper. Until then,
# pointing testpaths at `tests` keeps collection clean (the workflow
# itself skips `pytest` entirely while `tests/` doesn't exist).
[pytest]
python_files = test_*.py
testpaths = tests
