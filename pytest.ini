# Restrict pytest collection to the canonical `test_*.py` pattern.
# The legacy `*_test.py` scratch files in test/ (simple_test.py,
# nllb_test.py, opus_test.py, …) execute model downloads at import
# time; collecting them would download HuggingFace checkpoints during
# CI and produce slow, network-dependent runs with no assertions.
# Cycle 0 reorganizes these into tests/ proper and converts or deletes
# the scratch scripts.
[pytest]
python_files = test_*.py
testpaths = test tests
