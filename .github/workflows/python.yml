name: Python CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version to test (leave blank to run full matrix)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  detect:
    # Lightweight gate: classify how to install dependencies. A modern
    # packaging manifest (pyproject.toml/setup.py/setup.cfg) is preferred;
    # bare requirements.txt is supported as a fallback until the pyproject
    # migration lands (see specs/pitches/0000-rebrand-stabilize/). Only
    # repos with no manifest at all skip CI.
    runs-on: ubuntu-latest
    outputs:
      manifest: ${{ steps.check.outputs.manifest }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          if [[ -f pyproject.toml || -f setup.py || -f setup.cfg ]]; then
            echo "manifest=pyproject" >> "$GITHUB_OUTPUT"
          elif [[ -f requirements.txt ]]; then
            echo "manifest=requirements" >> "$GITHUB_OUTPUT"
            echo "::notice::No packaging manifest found; installing from requirements.txt and tooling pinned in workflow."
          else
            echo "manifest=none" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python manifest (pyproject.toml/setup.py/setup.cfg/requirements.txt) found — skipping Python CI."
          fi

  test:
    needs: detect
    if: needs.detect.outputs.manifest != 'none'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # workflow_dispatch with a non-empty python-version input runs that
        # version only; otherwise (push, PR, or blank dispatch) runs the full matrix.
        python-version: ${{ github.event.inputs.python-version && fromJSON(format('["{0}"]', github.event.inputs.python-version)) || fromJSON('["3.10","3.11","3.12"]') }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}
          restore-keys: |
            hf-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [[ "${{ needs.detect.outputs.manifest }}" == "pyproject" ]]; then
            pip install -e ".[dev]"
          else
            pip install -r requirements.txt
            pip install ruff mypy pytest pytest-cov
          fi

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy .

      - name: Run tests with coverage
        run: pytest --cov
